services:

  mysql:
    image: mysql:8.0
    container_name: pomodoro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Senha123!
      MYSQL_DATABASE: pomodoro_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pSenha123!"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./pomodoro-backend
      dockerfile: Dockerfile
    container_name: pomodoro-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/pomodoro_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: Senha123!
      PORT: 3333
      JWT_SECRET: super-secret-key-change-in-production-must-be-256-bits-long
      MAIL_HOST: sandbox.smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USER: 2063634e73b8be
      MAIL_PASS: a58c356451e814
    ports:
      - "3333:3333"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./pomodoro-frontend
      dockerfile: Dockerfile
    container_name: pomodoro-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
