spring.application.name=pomodoro-backend

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pomodoro_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Senha123!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=${PORT:3333}

jwt.secret=${JWT_SECRET:super-secret-key-change-in-production-must-be-256-bits-long}
jwt.expiration-ms=86400000

spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USER:2063634e73b8be}
spring.mail.password=${MAIL_PASS:a58c356451e814}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.org.hibernate.SQL=DEBUG